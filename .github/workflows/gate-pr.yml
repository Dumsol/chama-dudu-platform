name: Gate PR

on:
  pull_request:
    branches: [main, master]
    paths:
      - "functions/**"
      - "firebase.json"
      - "firestore.indexes.json"
      - "firestore.rules"
      - "storage.rules"
      - ".github/workflows/**"

jobs:
  gate-pr:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run gate:pr
        run: npm run gate:pr
